<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256">
  <!-- Background -->
  <rect width="256" height="256" fill="#0d6efd" rx="64"/>
  
  <!-- Robot Head (simple geometric design) -->
  <g transform="translate(128, 128)">
    <!-- Head -->
    <rect x="-45" y="-50" width="90" height="90" fill="#ffffff" rx="8"/>
    
    <!-- Left Eye -->
    <rect x="-30" y="-30" width="20" height="20" fill="#0d6efd" rx="4"/>
    
    <!-- Right Eye -->
    <rect x="10" y="-30" width="20" height="20" fill="#0d6efd" rx="4"/>
    
    <!-- Antenna Left -->
    <line x1="-35" y1="-55" x2="-35" y2="-85" stroke="#0d6efd" stroke-width="6" stroke-linecap="round"/>
    <circle cx="-35" cy="-90" r="5" fill="#0d6efd"/>
    
    <!-- Antenna Right -->
    <line x1="35" y1="-55" x2="35" y2="-85" stroke="#0d6efd" stroke-width="6" stroke-linecap="round"/>
    <circle cx="35" cy="-90" r="5" fill="#0d6efd"/>
    
    <!-- Mouth -->
    <path d="M -20,15 Q 0,25 20,15" stroke="#0d6efd" stroke-width="3" fill="none" stroke-linecap="round"/>
  </g>
</svg>
